<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>결제 승인 처리 — CloudPress</title>
  <link rel="stylesheet" href="/dashboard.css"/>
</head>
<body>
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px">
  <div class="card" style="max-width:520px;width:100%;text-align:center">
    <h1 style="font-family:var(--font-head);margin-bottom:10px">결제 승인 처리 중...</h1>
    <p style="color:var(--muted);margin-bottom:14px">서버에서 위변조 검증을 진행합니다.</p>
    <div id="result" class="info-box">잠시만 기다려주세요.</div>
    <div style="margin-top:16px">
      <a href="/pricing.html" class="btn btn-ghost btn-sm">요금제로 돌아가기</a>
    </div>
  </div>
</div>
<script src="/app.js"></script>
<script>
async function main(){
  const q = new URLSearchParams(location.search);
  const paymentKey = q.get('paymentKey') || '';
  const orderId = q.get('orderId') || '';
  const amount = Number(q.get('amount') || 0);
  const plan = q.get('plan') || orderId.split('_')[1] || '';
  const result = document.getElementById('result');

  if (!paymentKey || !orderId || !amount) {
    result.className = 'warn-box';
    result.textContent = '필수 파라미터가 누락되었습니다.';
    return;
  }
  const res = await CP.paymentConfirm({ paymentKey, orderId, amount });
  if (!res.ok) {
    result.className = 'warn-box';
    result.textContent = res.error || '결제 검증 실패';
    return;
  }
  result.className = 'info-box';
  result.textContent = '결제 검증이 완료되었습니다. 호스팅 생성 페이지로 이동합니다.';
  setTimeout(() => {
    location.href = `/create.html?orderId=${encodeURIComponent(orderId)}&plan=${encodeURIComponent(plan)}`;
  }, 1200);
}
main();
</script>
</body>
</html>
