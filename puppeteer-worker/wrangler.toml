# puppeteer-worker/wrangler.toml — CloudPress v6.0
# ✅ 외부 호스팅사 계정 없음 — iFastnet 서버 IP만 사용

name = "cloudpress-puppet"
main = "index.js"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Cloudflare Browser Rendering API
[browser]
binding = "MYBROWSER"

[vars]
# Worker 시크릿 (메인 Functions와 동일하게 설정)
WORKER_SECRET = "Swsh120327!"

# ──────────────────────────────────────────────
# ✅ iFastnet 서버 직접 접근 설정
#    외부 호스팅사에 가입하지 않음
#    이 서버의 IP/FTP/패널 정보만 사용
# ──────────────────────────────────────────────

# 서버 IP (iFastnet 물리 서버 IP)
SERVER_IP = ""          # 예: 185.27.134.10

# FTP 접근 (서버에 WordPress 파일 직접 업로드)
FTP_HOST = ""           # 보통 SERVER_IP와 동일
FTP_USER = ""           # FTP 계정
FTP_PASS = ""           # FTP 비밀번호
FTP_PORT = "21"

# 서버 패널 (cPanel / DirectAdmin / Plesk 등)
SERVER_PANEL = ""       # 예: http://185.27.134.10:2082
PANEL_USER   = ""       # 패널 관리자 계정
PANEL_PASS   = ""       # 패널 관리자 비밀번호

# MySQL (서버 DB)
DB_HOST      = "localhost"
DB_ROOT_USER = "root"
DB_ROOT_PASS = ""

# 웹 루트 경로 (사이트 파일이 올라갈 기본 경로)
WEB_ROOT = "/htdocs"    # 또는 /public_html, /var/www/html 등

# PHP 바이너리
PHP_BIN = "php8.3"

# CloudPress 서브도메인 (자체 발급용)
# 사용자 사이트는 {slug}.{SITE_DOMAIN} 형태로 생성됨
SITE_DOMAIN = "cloud-press.co.kr"

# CNAME 타겟 (도메인 연결 시 DNS 안내)
CNAME_TARGET = "proxy.cloud-press.co.kr"

# 배포 방법:
#   cd puppeteer-worker
#   npm install
#   npx wrangler secret put PANEL_PASS   ← 민감정보는 secret으로 관리 권장
#   npx wrangler secret put FTP_PASS
#   npx wrangler secret put DB_ROOT_PASS
#   npx wrangler deploy
