<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title id="pageTitle">CloudPress CMS</title>
<meta name="description" content="" id="metaDesc">
<link rel="stylesheet" href="/style.css">
</head>
<body>

<div id="siteHeader"></div>

<main class="site-main">
  <article class="article" id="articleContent">
    <div class="skeleton sk-title" style="height:36px;margin-bottom:16px"></div>
    <div class="skeleton sk-meta" style="margin-bottom:24px"></div>
    <div class="skeleton sk-text"></div>
    <div class="skeleton sk-text"></div>
    <div class="skeleton sk-text" style="width:80%"></div>
    <div class="skeleton sk-text" style="margin-top:16px"></div>
    <div class="skeleton sk-text"></div>
  </article>

  <aside class="sidebar">
    <div class="widget">
      <h3 class="widget-title">카테고리</h3>
      <ul id="sidebarCategories"><li style="color:#9ca3af">로딩 중...</li></ul>
    </div>
    <div class="widget">
      <h3 class="widget-title">최근 글</h3>
      <ul id="recentPosts"><li style="color:#9ca3af">로딩 중...</li></ul>
    </div>
  </aside>
</main>

<div id="siteFooter"></div>

<script src="/single.js"></script>
</body>
</html>
