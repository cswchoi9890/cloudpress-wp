<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>404 — 페이지를 찾을 수 없습니다</title>
<link rel="stylesheet" href="/style.css">
<link rel="stylesheet" href="/404.css"/>
</head>
<body>
<div class="code">404</div>
<h1>페이지를 찾을 수 없습니다</h1>
<p>요청하신 페이지가 이동되었거나 삭제되었습니다.</p>
<div class="search-form">
  <input type="search" id="s" placeholder="검색..." onkeydown="if(event.key==='Enter')go()">
  <button onclick="go()">검색</button>
</div>
<div class="btns">
  <a class="btn btn-primary" href="/">홈으로</a>
  <a class="btn btn-sec" href="javascript:history.back()">이전 페이지</a>
</div>
<script src="/404.js"></script>
</body>
</html>
