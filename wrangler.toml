# CloudPress v21.0 — wrangler.toml
# 3개 도메인 분리 구성:
#   홈/랜딩:      cloud-press.co.kr
#   대시보드:     hosting-console.cloud-press.co.kr
#   서버 상태:    status.cloud-press.co.kr

name = "cloudpress-wp"
main = "worker.js"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# ── D1: 플랫폼 메인 DB ─────────────────────────────────────────────────────────
[[d1_databases]]
binding       = "DB"
database_name = "cloudpress-db"
database_id   = "02d86436-b49f-4efa-a93b-baa90f3ee095"

# ── KV: 세션 ───────────────────────────────────────────────────────────────────
[[kv_namespaces]]
binding = "SESSIONS"
id      = "7486ca3c985b41ee8e2d24589ab2be6d"

# ── KV: 이중 캐시 ─────────────────────────────────────────────────────────────
[[kv_namespaces]]
binding = "CACHE"
id      = "e1acf814c1244a59bbc24865723e479d"

# ── 환경 변수 ─────────────────────────────────────────────────────────────────
[vars]
CF_ACCOUNT_ID  = ""
CF_API_TOKEN   = ""
PURGE_KEY      = ""
ENCRYPTION_KEY = ""

# ── 도메인 라우팅 분리 ────────────────────────────────────────────────────────
# IP 방식: A 레코드(proxied) + Worker Route 조합
# Host 헤더로 도메인 구별 (Custom Domain 대신 IP 방식)
#
# 설정할 A 레코드 (Cloudflare DNS, proxied=true):
#   cloud-press.co.kr         → A  104.21.0.1  (Proxied)
#   hosting-console.cloud-press.co.kr → A  104.21.0.1  (Proxied)
#   status.cloud-press.co.kr  → A  104.21.0.1  (Proxied)
#
# Worker Routes:
#   cloud-press.co.kr/*               → cloudpress-wp (홈/랜딩)
#   www.cloud-press.co.kr/*           → cloudpress-wp
#   hosting-console.cloud-press.co.kr/* → cloudpress-wp (대시보드+어드민)
#   status.cloud-press.co.kr/*        → cloudpress-wp (실시간 서버 상태)

# ── CPU 한도 ───────────────────────────────────────────────────────────────────
[limits]
cpu_ms = 50000

# ── Scheduled ─────────────────────────────────────────────────────────────────
[[triggers.crons]]
crons = ["*/5 * * * *"]

# ── 개발 환경 ──────────────────────────────────────────────────────────────────
[dev]
port = 8788
local_protocol = "http"
