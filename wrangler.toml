# CloudPress v19.0 — wrangler.toml
# [v19.0 수정 사항]
# - compatibility_date 최신화 (2025-01-01 → 2025-04-01)
# - WP_ORIGIN_URL 제거: 플랫폼 Worker는 origin proxy 없음 (각 사이트 Worker가 직접 처리)
# - 도메인 cloudpress.site 기준
# - CF_ACCOUNT_ID / CF_API_TOKEN → wrangler secret put 으로 설정

name = "cloudpress-wp"
main = "worker.js"
compatibility_date = "2025-04-01"

# ── 메인 D1 Database ──
[[d1_databases]]
binding       = "DB"
database_name = "cloudpress-db"
database_id   = "02d86436-b49f-4efa-a93b-baa90f3ee095"

# ── KV: 세션 ──
[[kv_namespaces]]
binding = "SESSIONS"
id      = "7486ca3c985b41ee8e2d24589ab2be6d"

# ── KV: 도메인→사이트 매핑 캐시 ──
[[kv_namespaces]]
binding = "CACHE"
id      = "e1acf814c1244a59bbc24865723e479d"

# ── 환경 변수 ──
# CF_ACCOUNT_ID, CF_API_TOKEN → wrangler secret put CF_ACCOUNT_ID
[vars]
CF_ACCOUNT_ID = ""
CF_API_TOKEN  = ""

# ── Limits ──
[limits]
cpu_ms = 30000

# ── 개발 환경 ──
[dev]
port = 8788
local_protocol = "http"
